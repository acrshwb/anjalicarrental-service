<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>404 - Page Not Found | ANJALI CAR RENTAL SERVICE</title>

<meta name="robots" content="noindex">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{

background:#050505;
color:#fff;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

text-align:center;

padding:20px;

}

.container{

max-width:600px;

}

h1{

font-size:110px;

color:#D4AF37;

}

h2{

margin:20px 0;

font-size:32px;

}

p{

color:#cfcfcf;

line-height:1.8;

margin-bottom:35px;

}

a{

display:inline-block;

padding:15px 35px;

background:#D4AF37;

color:#000;

text-decoration:none;

font-weight:bold;

border-radius:8px;

transition:.3s;

}

a:hover{

transform:translateY(-3px);

}

</style>

</head>

<body>

<div class="container">

<h1>404</h1>

<h2>Page Not Found</h2>

<p>

Sorry! The page you're looking for doesn't exist
or has been moved.

</p>

<a href="index.html">

Go Back Home

</a>

</div>

</body>

</html>
